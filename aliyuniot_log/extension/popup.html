<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 12px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #1f2328;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 15px;
      }

      button {
        width: 100%;
        height: 34px;
        margin-top: 8px;
        border: 1px solid #2563eb;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      button:first-of-type {
        margin-top: 0;
      }

      button.secondary {
        background: #fff;
        color: #2563eb;
      }

      .field {
        display: grid;
        grid-template-columns: 1fr 86px;
        gap: 8px;
        align-items: center;
        margin-top: 10px;
        font-size: 12px;
        color: #667085;
      }

      input {
        height: 30px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        padding: 0 8px;
        font: inherit;
      }

      #status {
        margin-top: 10px;
        min-height: 34px;
        font-size: 12px;
        color: #667085;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h1>Aliyun IoT Log Collector</h1>
    <button id="collect">开始后台抓取</button>
    <div class="field">
      <label for="searchInterval">定时搜索间隔（分钟）</label>
      <input id="searchInterval" min="1" step="1" type="number" value="5" />
    </div>
    <button class="secondary" id="searchTimer">开始定时搜索</button>
    <div id="status">打开阿里云 IoT 日志页后使用。</div>
    <script src="popup.js"></script>
  </body>
</html>
